<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <title>
        Axion Project Manager
    </title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

    body{
        background: #f4f7fb;
        min-height: 100vh;
        color: #1e293b;
        font-family: Arial, sans-serif;
    }

    .navbar{
        background: #1e3a8a !important;
        box-shadow: 0 2px 15px rgba(0,0,0,0.08);
    }

    .navbar-brand{
        font-weight: bold;
        font-size: 23px;
        color: white !important;
    }

    .card{
        background: white;
        border: none;
        border-radius: 18px;
        box-shadow: 0 4px 25px rgba(0,0,0,0.06);
        color: #1e293b;
    }

    .form-control,
    .form-select{
        border-radius: 12px;
        border: 1px solid #dbe2ea;
        padding: 12px;
        background: white;
    }

    .form-control:focus,
    .form-select:focus{
        box-shadow: none;
        border-color: #2563eb;
    }

    .btn-primary{
        background: #2563eb;
        border: none;
        border-radius: 12px;
        padding: 10px 20px;
    }

    .btn-primary:hover{
        background: #1d4ed8;
    }

    .btn-success{
        background: #0f766e;
        border: none;
        border-radius: 12px;
    }

    .btn-success:hover{
        background: #115e59;
    }

    .btn-danger{
        border-radius: 12px;
    }

    .btn-warning{
        border-radius: 12px;
    }

    .btn-outline-light{
        border-radius: 12px;
    }

    .btn-outline-light:hover{
        color: #2563eb;
    }

    table{
        background: white;
        border-radius: 15px;
        overflow: hidden;
    }

    th{
        background: #2563eb !important;
        color: white !important;
    }

    .table td{
        vertical-align: middle;
    }

    .badge{
        padding: 8px 12px;
        border-radius: 10px;
    }

    .main-container{
        padding-top: 40px;
        padding-bottom: 40px;
    }

    .alert-info{
        background: #dbeafe;
        border: none;
        color: #1e3a8a;
        border-radius: 12px;
    }

    a{
        text-decoration: none;
    }

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            ИС планирования проектов АО «Аксион»
        </a>

        <div>

            {% if user.is_authenticated %}

                <a href="/" class="btn btn-outline-light me-2">
                    Главная
                </a>

                <a href="/projects/" class="btn btn-outline-light me-2">
                    Проекты
                </a>

                <a href="/tasks/" class="btn btn-outline-light me-2">
                    Задачи
                </a>

                <a href="/profile/" class="btn btn-outline-info me-2">
                    ЛК
                </a>

                {% if user.is_superuser %}

                <a href="/admin/" class="btn btn-warning me-2">
                    Админка
                </a>

                {% endif %}

                <a href="/logout/" class="btn btn-danger">
                    Выход
                </a>

            {% else %}

                <a href="/login/" class="btn btn-outline-light me-2">
                    Вход
                </a>

                <a href="/register/" class="btn btn-primary">
                    Регистрация
                </a>

            {% endif %}

        </div>

    </div>

</nav>

<div class="container main-container">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
